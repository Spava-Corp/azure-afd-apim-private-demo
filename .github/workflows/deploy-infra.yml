name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/deploy-infra.yml']
  pull_request:
    branches: [main]
    paths: ['infra/**', '.github/workflows/deploy-infra.yml']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

# Prerequisite: the GitHub Actions OIDC service principal must have Owner or
# User Access Administrator on the target resource group or subscription.
# The deployment creates Key Vault RBAC role assignments, which Contributor
# alone cannot write.

env:
  RESOURCE_GROUP: rg-afd-apim-private-demo-dev-wus2
  LOCATION: westus2

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep --outfile /tmp/main.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Deployment
        run: |
          az group create -n ${{ env.RESOURCE_GROUP }} -l ${{ env.LOCATION }} --tags environment=dev project=afd-apim-private-demo
          az deployment group validate \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

  what-if:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            -n ${{ env.RESOURCE_GROUP }} \
            -l ${{ env.LOCATION }} \
            --tags environment=dev project=afd-apim-private-demo

      - name: Register Resource Providers
        run: |
          for ns in Microsoft.Cdn Microsoft.Network Microsoft.ContainerService Microsoft.ApiManagement; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")
            if [ "$state" != "Registered" ]; then
              echo "Registering $ns (current state: $state)..."
              az provider register --namespace "$ns" --wait
            else
              echo "$ns already registered."
            fi
          done

      - name: Reconcile AKS (if exists)
        id: aks_precheck
        run: |
          set -euo pipefail

          AKS_NAME="demo-aks-dev"
          RESOURCE_ID=$(az resource show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "$AKS_NAME" \
            --resource-type Microsoft.ContainerService/managedClusters \
            --query id \
            --output tsv 2>/dev/null || true)

          if [ -z "$RESOURCE_ID" ]; then
            echo "AKS cluster $AKS_NAME not found in ${{ env.RESOURCE_GROUP }}; skipping reconciliation."
            exit 0
          fi

          set +e
          AKS_STATE=$(az aks show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "$AKS_NAME" \
            --query provisioningState \
            --output tsv 2>&1)
          SHOW_EXIT_CODE=$?
          set -e

          if [ $SHOW_EXIT_CODE -ne 0 ]; then
            if echo "$AKS_STATE" | grep -qi "Could not find control plane"; then
              echo "AKS cluster $AKS_NAME has an orphaned control plane reference; reconciling with az aks update."
              az aks update --resource-group "${{ env.RESOURCE_GROUP }}" --name "$AKS_NAME" --yes
              exit 0
            fi

            echo "$AKS_STATE"
            exit $SHOW_EXIT_CODE
          fi

          case "$AKS_STATE" in
            Failed|Canceled)
              echo "AKS cluster $AKS_NAME is in provisioningState '$AKS_STATE'; reconciling with az aks update."
              az aks update --resource-group "${{ env.RESOURCE_GROUP }}" --name "$AKS_NAME" --yes
              ;;
            *)
              echo "AKS cluster $AKS_NAME is in provisioningState '$AKS_STATE'; no reconciliation needed."
              ;;
          esac

          # Capture current K8s version to avoid version mismatch in Bicep deploy
          CURRENT_K8S_VERSION=$(az aks show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "$AKS_NAME" \
            --query kubernetesVersion -o tsv)
          echo "Current Kubernetes version: $CURRENT_K8S_VERSION"
          echo "CURRENT_K8S_VERSION=$CURRENT_K8S_VERSION" >> "$GITHUB_ENV"

      - name: Remove APIM private endpoint connections
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          APIM_NAME=$(az resource list \
            --resource-group "$RG" \
            --resource-type Microsoft.ApiManagement/service \
            --query "[?starts_with(name,'demo-apim-dev')].name" \
            -o tsv 2>/dev/null || true)

          if [ -z "$APIM_NAME" ]; then
            echo "No APIM instance found in $RG; skipping PE cleanup."
            exit 0
          fi

          # One-time transitional cleanup for the APIM VNet mode migration: Azure
          # blocks switching APIM to Internal mode while legacy PE connections exist.
          pe_ids=$(az network private-endpoint-connection list \
            --resource-group "$RG" \
            --type Microsoft.ApiManagement/service \
            --name "$APIM_NAME" \
            --query "[].id" \
            -o tsv 2>/dev/null || true)

          if [ -z "$pe_ids" ]; then
            echo "No APIM private endpoint connections found; nothing to remove."
          else
            for pe_id in $pe_ids; do
              echo "Deleting APIM private endpoint connection: $pe_id"
              az network private-endpoint-connection delete --id "$pe_id" --yes
            done
          fi

          echo "Deleting standalone APIM private endpoint resource if present..."
          az network private-endpoint delete \
            --resource-group "$RG" \
            --name "demo-pe-apim-dev" || true

      - name: Deploy Infrastructure
        run: |
          # Pass current K8s version to Bicep to prevent version mismatch/downgrade
          EXTRA_PARAMS=""
          if [ -n "${CURRENT_K8S_VERSION:-}" ]; then
            EXTRA_PARAMS="--parameters kubernetesVersion=$CURRENT_K8S_VERSION"
          fi
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            $EXTRA_PARAMS \
            --name "gha-deploy-${{ github.run_number }}"

      - name: Approve AFD Private Link connection on APIM
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          APIM_NAME=$(az resource list \
            --resource-group "$RG" \
            --resource-type Microsoft.ApiManagement/service \
            --query "[?starts_with(name,'demo-apim-dev')].name" \
            -o tsv 2>/dev/null || true)

          if [ -z "$APIM_NAME" ]; then
            echo "No APIM instance found in $RG; skipping PE approval."
            exit 0
          fi

          echo "Checking pending Private Link connections on APIM: $APIM_NAME"
          pending_ids=""
          for i in $(seq 1 24); do
            pending_ids=$(az network private-endpoint-connection list \
              --resource-group "$RG" \
              --type Microsoft.ApiManagement/service \
              --name "$APIM_NAME" \
              --query "[?properties.privateLinkServiceConnectionState.status=='Pending'].id" \
              -o tsv 2>/dev/null || true)

            if [ -n "$pending_ids" ]; then
              echo "Found pending Private Link connection(s) on attempt $i/24."
              break
            fi

            if [ $i -lt 24 ]; then
              echo "No pending APIM Private Link connections yet (attempt $i/24); waiting 5s..."
              sleep 5
            fi
          done

          if [ -z "$pending_ids" ]; then
            echo "No pending APIM Private Link connections found; nothing to approve."
            exit 0
          fi

          for pe_id in $pending_ids; do
            echo "Approving Private Link connection: $pe_id"
            az network private-endpoint-connection approve \
              --id "$pe_id" \
              --description "Approved by CD pipeline for AFD Private Link"
          done

      - name: Ensure AKS API server is healthy
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AKS="demo-aks-dev"

          # Force reconciliation to ensure control plane is fully operational
          echo "Forcing AKS control plane reconciliation..."
          az aks update --resource-group "$RG" --name "$AKS" --yes 2>&1 | tail -5

          # Wait for the update to complete
          echo "Waiting for AKS update to complete..."
          az aks wait --resource-group "$RG" --name "$AKS" --updated --timeout 600

          echo "AKS cluster reconciliation complete. Verifying API server..."
          # Brief verification with RunCommand
          for i in $(seq 1 5); do
            set +e
            RESULT=$(az aks command invoke \
              --resource-group "$RG" \
              --name "$AKS" \
              --command "kubectl cluster-info" \
              --query logs -o tsv 2>&1)
            RC=$?
            set -e
            if [ $RC -eq 0 ] && echo "$RESULT" | grep -qi "control plane"; then
              echo "✅ AKS API server verified healthy"
              echo "$RESULT" | head -3
              exit 0
            fi
            echo "API server check attempt $i/5: $(echo "$RESULT" | head -1)"
            sleep 30
          done
          echo "⚠️  Could not verify API server health, but proceeding..."

      - name: Deploy K8s services (Petstore, Podinfo, Internal LB)
        id: k8s_deploy
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AKS="demo-aks-dev"

          # Retry helper that checks BOTH exit code AND output for errors.
          # az aks command invoke returns exit 0 even when the inner command fails,
          # so we must inspect the logs output for error patterns.
          invoke_with_retry() {
            local retries=6
            local delay=30
            local tmpfile
            tmpfile=$(mktemp)
            for i in $(seq 1 $retries); do
              set +e
              "$@" --query logs -o tsv > "$tmpfile" 2>&1
              local rc=$?
              set -e
              local output
              output=$(cat "$tmpfile")

              # Check for known transient/false errors
              if [ $rc -eq 0 ] && ! echo "$output" | grep -qiE "^Error:|error validating|cluster unreachable|failed to download openapi|AADSTS|i/o timeout"; then
                echo "$output"
                rm -f "$tmpfile"
                return 0
              fi
              echo "⚠️  Attempt $i/$retries failed (rc=$rc). Output:"
              echo "$output" | head -20
              if [ $i -lt $retries ]; then
                echo "Retrying in ${delay}s..."
                sleep $delay
              fi
            done
            echo "❌ az aks command invoke failed after $retries attempts"
            rm -f "$tmpfile"
            return 1
          }

          # Wait for AKS API server to be reachable (Bicep may have triggered a reconciliation)
          echo "Waiting for AKS API server to become ready..."
          for i in $(seq 1 15); do
            set +e
            HEALTH=$(az aks command invoke \
              --resource-group "$RG" \
              --name "$AKS" \
              --command "kubectl get --raw /readyz" \
              --query logs -o tsv 2>&1)
            RC=$?
            set -e
            if [ $RC -eq 0 ] && echo "$HEALTH" | grep -q "ok"; then
              echo "✅ AKS API server is ready (attempt $i/15)"
              break
            fi
            echo "API server not ready yet (attempt $i/15): $(echo "$HEALTH" | head -1)"
            if [ $i -eq 15 ]; then
              echo "WARNING: API server did not become ready after 15 attempts, proceeding anyway..."
            fi
            sleep 30
          done

          invoke_with_retry az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl create namespace demo-apis --dry-run=client -o yaml | kubectl apply --validate=false -f -"

          cd infra/k8s/petstore
          invoke_with_retry az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-petstore . -n demo-apis --create-namespace --set replicaCount=2 --wait --timeout 300s" \
            --file .
          cd "$GITHUB_WORKSPACE"

          cd infra/k8s/podinfo
          invoke_with_retry az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-podinfo . -n demo-apis --create-namespace --set replicaCount=2 --wait --timeout 300s" \
            --file .
          cd "$GITHUB_WORKSPACE"

          cd infra/k8s/internal-lb
          invoke_with_retry az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-internal-lb . -n demo-apis --create-namespace --wait --timeout 300s" \
            --file .
          cd "$GITHUB_WORKSPACE"

      # Re-login to refresh OIDC token — long-running steps above can exhaust the token
      - name: Azure Login (refresh)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover internal LB IP and frontend IP config ID
        id: discover_lb
        if: steps.k8s_deploy.outcome == 'success'
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AKS="demo-aks-dev"

          # Same retry helper for discovery calls
          invoke_get() {
            local retries=3
            local delay=15
            local tmpfile
            tmpfile=$(mktemp)
            for i in $(seq 1 $retries); do
              set +e
              az aks command invoke "$@" --query logs -o tsv > "$tmpfile" 2>&1
              local rc=$?
              set -e
              local output
              output=$(cat "$tmpfile")
              if [ $rc -eq 0 ] && ! echo "$output" | grep -qiE "AADSTS|Operation returned an invalid"; then
                echo "$output"
                rm -f "$tmpfile"
                return 0
              fi
              echo "⚠️  invoke_get attempt $i/$retries failed" >&2
              [ $i -lt $retries ] && sleep $delay
            done
            rm -f "$tmpfile"
            return 1
          }

          LB_IP=""
          for i in $(seq 1 30); do
            RAW=$(invoke_get \
              --resource-group "$RG" \
              --name "$AKS" \
              --command "kubectl get svc demo-internal-lb-petstore -n demo-apis -o jsonpath='{.status.loadBalancer.ingress[0].ip}'" \
              2>/dev/null || true)
            # Strip whitespace and single quotes from jsonpath output
            LB_IP=$(echo "$RAW" | tr -d "[:space:]'")
            if [[ -n "$LB_IP" && "$LB_IP" != "<none>" && "$LB_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              break
            fi
            LB_IP=""
            echo "Waiting for LB IP... ($i/30)"
            sleep 10
          done

          if [ -z "$LB_IP" ]; then
            echo "ERROR: Could not discover internal LB IP from service demo-internal-lb-petstore"
            echo "Dumping service status for debugging:"
            invoke_get --resource-group "$RG" --name "$AKS" \
              --command "kubectl describe svc demo-internal-lb-petstore -n demo-apis" 2>&1 || true
            exit 1
          fi
          echo "Discovered LB IP: $LB_IP"

          NODE_RG=$(az aks show \
            --resource-group "$RG" \
            --name "$AKS" \
            --query nodeResourceGroup -o tsv)

          # Find the LB that has our discovered IP as a frontend
          FRONTEND_IP_CONFIG_ID=$(az network lb list -g "$NODE_RG" \
            --query "[].frontendIPConfigurations[?privateIPAddress=='${LB_IP}'].id | []" -o tsv | head -1)

          if [ -z "$FRONTEND_IP_CONFIG_ID" ]; then
            echo "ERROR: Could not find frontend IP config for IP $LB_IP in node resource group $NODE_RG"
            exit 1
          fi
          echo "Discovered frontend IP config ID: $FRONTEND_IP_CONFIG_ID"

          echo "LB_IP=$LB_IP" >> "$GITHUB_ENV"
          echo "FRONTEND_IP_CONFIG_ID=$FRONTEND_IP_CONFIG_ID" >> "$GITHUB_ENV"

      - name: Re-deploy infrastructure with APIM API parameters
        if: steps.discover_lb.outcome == 'success'
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters aksInternalLbIp="$LB_IP" aksLoadBalancerFrontendIpConfigId="$FRONTEND_IP_CONFIG_ID" \
            --name "gha-deploy-apis-${{ github.run_number }}"

      - name: Smoke test AFD endpoint
        if: steps.discover_lb.outcome == 'success'
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AFD_URL=$(az deployment group show \
            --resource-group "$RG" \
            --name "gha-deploy-apis-${{ github.run_number }}" \
            --query "properties.outputs.afdEndpointUrl.value" \
            -o tsv 2>/dev/null || true)

          if [ -z "$AFD_URL" ]; then
            AFD_URL=$(az deployment group show \
              --resource-group "$RG" \
              --name "gha-deploy-${{ github.run_number }}" \
              --query "properties.outputs.afdEndpointUrl.value" \
              -o tsv 2>/dev/null || true)
          fi

          if [ -z "$AFD_URL" ]; then
            echo "Unable to determine AFD endpoint URL for smoke test."
            exit 1
          fi

          echo "Smoke testing ${AFD_URL}/healthz with retry for Private Link propagation..."
          for i in $(seq 1 20); do
            set +e
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" "${AFD_URL}/healthz")
            RC=$?
            set -e

            if [ $RC -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Smoke test passed on attempt $i/20."
              exit 0
            fi

            echo "Smoke test attempt $i/20 returned ${HTTP_CODE:-curl-error}; waiting 15s..."
            if [ $i -lt 20 ]; then
              sleep 15
            fi
          done

          echo "Smoke test failed: ${AFD_URL}/healthz did not return HTTP 200 in time."
          exit 1
