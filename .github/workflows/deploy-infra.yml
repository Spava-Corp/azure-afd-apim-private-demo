name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/deploy-infra.yml']
  pull_request:
    branches: [main]
    paths: ['infra/**', '.github/workflows/deploy-infra.yml']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

# Prerequisite: the GitHub Actions OIDC service principal must have Owner or
# User Access Administrator on the target resource group or subscription.
# The deployment creates Key Vault RBAC role assignments, which Contributor
# alone cannot write.

env:
  RESOURCE_GROUP: rg-afd-apim-private-demo-dev-wus2
  LOCATION: westus2

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep

      - name: Bicep Build
        run: az bicep build --file infra/main.bicep --outfile /tmp/main.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Deployment
        run: |
          az group create -n ${{ env.RESOURCE_GROUP }} -l ${{ env.LOCATION }} --tags environment=dev project=afd-apim-private-demo
          az deployment group validate \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

  what-if:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            -n ${{ env.RESOURCE_GROUP }} \
            -l ${{ env.LOCATION }} \
            --tags environment=dev project=afd-apim-private-demo

      - name: Register Resource Providers
        run: |
          for ns in Microsoft.Cdn Microsoft.Network Microsoft.ContainerService Microsoft.ApiManagement; do
            state=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")
            if [ "$state" != "Registered" ]; then
              echo "Registering $ns (current state: $state)..."
              az provider register --namespace "$ns" --wait
            else
              echo "$ns already registered."
            fi
          done

      - name: Reconcile AKS (if exists)
        run: |
          set -euo pipefail

          AKS_NAME="demo-aks-dev"
          RESOURCE_ID=$(az resource show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "$AKS_NAME" \
            --resource-type Microsoft.ContainerService/managedClusters \
            --query id \
            --output tsv 2>/dev/null || true)

          if [ -z "$RESOURCE_ID" ]; then
            echo "AKS cluster $AKS_NAME not found in ${{ env.RESOURCE_GROUP }}; skipping reconciliation."
            exit 0
          fi

          set +e
          AKS_STATE=$(az aks show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "$AKS_NAME" \
            --query provisioningState \
            --output tsv 2>&1)
          SHOW_EXIT_CODE=$?
          set -e

          if [ $SHOW_EXIT_CODE -ne 0 ]; then
            if echo "$AKS_STATE" | grep -qi "Could not find control plane"; then
              echo "AKS cluster $AKS_NAME has an orphaned control plane reference; reconciling with az aks update."
              az aks update --resource-group "${{ env.RESOURCE_GROUP }}" --name "$AKS_NAME" --yes
              exit 0
            fi

            echo "$AKS_STATE"
            exit $SHOW_EXIT_CODE
          fi

          case "$AKS_STATE" in
            Failed|Canceled)
              echo "AKS cluster $AKS_NAME is in provisioningState '$AKS_STATE'; reconciling with az aks update."
              az aks update --resource-group "${{ env.RESOURCE_GROUP }}" --name "$AKS_NAME" --yes
              ;;
            *)
              echo "AKS cluster $AKS_NAME is in provisioningState '$AKS_STATE'; no reconciliation needed."
              ;;
          esac

      - name: Deploy Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --name "gha-deploy-${{ github.run_number }}"

      - name: Deploy K8s services (Petstore, Podinfo, Internal LB)
        id: k8s_deploy
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AKS="demo-aks-dev"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "kubectl create namespace demo-apis --dry-run=client -o yaml | kubectl apply -f -"

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-petstore ./petstore -n demo-apis --set replicaCount=2 --wait --timeout 120s" \
            --file infra/k8s/petstore/

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-podinfo ./podinfo -n demo-apis --set replicaCount=2 --wait --timeout 120s" \
            --file infra/k8s/podinfo/

          az aks command invoke \
            --resource-group "$RG" \
            --name "$AKS" \
            --command "helm upgrade --install demo-internal-lb ./internal-lb -n demo-apis --wait --timeout 120s" \
            --file infra/k8s/internal-lb/

      - name: Discover internal LB IP and frontend IP config ID
        id: discover_lb
        if: steps.k8s_deploy.outcome == 'success'
        run: |
          set -euo pipefail
          RG="${{ env.RESOURCE_GROUP }}"
          AKS="demo-aks-dev"

          LB_IP=""
          for i in $(seq 1 24); do
            LB_IP=$(az aks command invoke \
              --resource-group "$RG" \
              --name "$AKS" \
              --command "kubectl get svc demo-internal-lb-petstore -n demo-apis -o jsonpath='{.status.loadBalancer.ingress[0].ip}'" \
              --query "logs" -o tsv | tr -d '[:space:]')
            if [ -n "$LB_IP" ] && [ "$LB_IP" != "<none>" ]; then
              break
            fi
            echo "Waiting for LB IP... ($i/24)"
            sleep 5
          done

          if [ -z "$LB_IP" ]; then
            echo "ERROR: Could not discover internal LB IP from service demo-internal-lb-petstore"
            exit 1
          fi
          echo "Discovered LB IP: $LB_IP"

          NODE_RG=$(az aks show \
            --resource-group "$RG" \
            --name "$AKS" \
            --query nodeResourceGroup -o tsv)

          LB_NAME=$(az network lb list -g "$NODE_RG" \
            --query "[?contains(name,'internal')].name" -o tsv)

          FRONTEND_IP_CONFIG_ID=$(az network lb frontend-ip list \
            -g "$NODE_RG" \
            --lb-name "$LB_NAME" \
            --query "[?privateIPAddress=='${LB_IP}'].id" -o tsv)

          if [ -z "$FRONTEND_IP_CONFIG_ID" ]; then
            echo "ERROR: Could not find frontend IP config for IP $LB_IP in LB $LB_NAME"
            exit 1
          fi
          echo "Discovered frontend IP config ID: $FRONTEND_IP_CONFIG_ID"

          echo "LB_IP=$LB_IP" >> "$GITHUB_ENV"
          echo "FRONTEND_IP_CONFIG_ID=$FRONTEND_IP_CONFIG_ID" >> "$GITHUB_ENV"

      - name: Re-deploy infrastructure with APIM API parameters
        if: steps.discover_lb.outcome == 'success'
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters aksInternalLbIp="$LB_IP" aksLoadBalancerFrontendIpConfigId="$FRONTEND_IP_CONFIG_ID" \
            --name "gha-deploy-apis-${{ github.run_number }}"

      - name: Approve AFD private endpoint connections on APIM
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          apim_resources_json=$(az resource list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --resource-type Microsoft.ApiManagement/service \
            --output json)

          APIM_NAME="$(APIM_RESOURCES_JSON="$apim_resources_json" python3 - <<'PY'
          import json
          import os
          import sys
          
          prefix = 'demo-apim-dev'
          resources = json.loads(os.environ['APIM_RESOURCES_JSON'])
          matches = [resource['name'] for resource in resources if resource.get('name', '').startswith(prefix)]
          
          if len(matches) != 1:
              print(
                  f"Expected exactly one APIM resource starting with {prefix!r}, found {len(matches)}: {matches}",
                  file=sys.stderr,
              )
              sys.exit(1)
          
          print(matches[0])
          PY
          )"
          echo "Checking pending private endpoint connections on APIM service: $APIM_NAME"

          pe_connections_json=$(az network private-endpoint-connection list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --type Microsoft.ApiManagement/service \
            --name "$APIM_NAME" \
            --output json)

          matching_connections="$(PE_CONNECTIONS_JSON="$pe_connections_json" python3 - <<'PY'
          import json
          import os
          
          connections = json.loads(os.environ['PE_CONNECTIONS_JSON'])
          
          for connection in connections:
              properties = connection.get('properties') or {}
              state = properties.get('privateLinkServiceConnectionState') or {}
              status = (state.get('status') or '').lower()
              description = state.get('description') or ''
              request_message = properties.get('requestMessage') or ''
              match_text = f'{description} {request_message}'.lower()
          
              if status == 'pending' and ('afd' in match_text or 'front door' in match_text):
                  summary = description or request_message or 'AFD-related request'
                  print(f"{connection['id']}\t{summary}")
          PY
          )"
          if [ -z "$matching_connections" ]; then
            echo "No pending AFD private endpoint approvals found on APIM."
            exit 0
          fi

          while IFS=$'\t' read -r connection_id connection_summary; do
            [ -n "$connection_id" ] || continue
            echo "Approving $connection_id ($connection_summary)"
            az network private-endpoint-connection approve \
              --id "$connection_id" \
              --description "Approved by GitHub Actions after AFD deployment"
          done <<< "$matching_connections"
