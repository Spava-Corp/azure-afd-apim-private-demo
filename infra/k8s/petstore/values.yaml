# Petstore Helm chart values
# Swagger Petstore v3 — demo backend for AFD → APIM → AKS architecture

replicaCount: 2

image:
  repository: swaggerapi/petstore3
  tag: unstable
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# TLS configuration for mTLS with APIM
# Generate certs using: infra/modules/aks/generate-self-signed-cert.sh
# Then base64-encode server.crt and server.key:
#   cat certs/server.crt | base64 -w0
#   cat certs/server.key | base64 -w0
tls:
  enabled: true
  secretName: petstore-tls
  # Placeholder values — replace with output from generate-self-signed-cert.sh
  crt: ""  # base64-encoded server.crt
  key: ""  # base64-encoded server.key

healthcheck:
  path: /api/v3/openapi.json
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
