{{- if and .Values.tls.enabled .Values.tls.crt .Values.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.secretName }}
  labels:
    {{- include "podinfo.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.tls.crt }}
  tls.key: {{ .Values.tls.key }}
{{- end }}
